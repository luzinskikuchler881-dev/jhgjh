<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Central de Verificação</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

/* BODY */
body{
background:linear-gradient(180deg,#020617,#0f172a);
color:#fff;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

/* CARD */
.card{
width:100%;
max-width:420px;
background:#0f172a;
border-radius:18px;
padding:30px;
text-align:center;
box-shadow:0 25px 70px rgba(0,0,0,0.7);
}

/* ICON */
.icon{
width:70px;
height:70px;
margin:auto;
margin-bottom:20px;
border-radius:20px;
background:linear-gradient(135deg,#3b82f6,#60a5fa);
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
}

/* TITULO */
h1{
font-size:24px;
margin-bottom:10px;
}

/* TEXTO */
p{
color:#94a3b8;
font-size:14px;
margin-bottom:20px;
}

/* INPUT */
.input{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid #334155;
background:#020617;
color:#fff;
margin-bottom:15px;
}

/* BOTÃO */
.btn{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#3b82f6,#2563eb);
color:white;
font-weight:600;
font-size:16px;
cursor:pointer;
transition:.2s;
}

.btn:hover{
transform:scale(1.03);
}

/* LOADING */
.loading{
display:none;
margin-top:20px;
}

.percent{
font-size:28px;
font-weight:700;
margin-bottom:10px;
}

.bar{
width:100%;
height:10px;
background:#1e293b;
border-radius:10px;
overflow:hidden;
}

.fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#3b82f6,#60a5fa);
transition:width .2s;
}

.status{
margin-top:10px;
font-size:13px;
color:#38bdf8;
}

/* RESULTADO */
.result{
display:none;
margin-top:20px;
background:#020617;
padding:20px;
border-radius:12px;
text-align:left;
}

.result h2{
font-size:18px;
margin-bottom:10px;
}

.result p{
font-size:14px;
color:#cbd5e1;
margin-bottom:10px;
}

/* BOTÃO FINAL */
.final-btn{
margin-top:15px;
display:block;
width:100%;
text-align:center;
background:#22c55e;
padding:14px;
border-radius:8px;
color:#fff;
text-decoration:none;
font-weight:600;
}

</style>
</head>

<body>

<div class="card">

<div class="icon">🔐</div>

<h1>Verificação de Segurança</h1>

<p>Confirme seu acesso para continuar.</p>

<input type="text" id="nome" class="input" placeholder="Digite seu nome">

<button class="btn" onclick="start()">
Continuar
</button>

<!-- LOADING -->
<div class="loading" id="loading">

<div class="percent" id="percent">0%</div>

<div class="bar">
<div class="fill" id="fill"></div>
</div>

<div class="status" id="status">Iniciando...</div>

</div>

<!-- RESULTADO -->
<div class="result" id="result">

<h2>✔ Verificação concluída</h2>

<p>Seu acesso foi validado com sucesso.</p>
<p>Você já pode continuar para a próxima etapa.</p>

<a href="https://prismatic-crostata-496139.netlify.app/" class="final-btn">
Continuar acesso
</a>

</div>

</div>

<script>

function start(){

let nome = document.getElementById("nome").value.trim()

if(nome === ""){
alert("Digite seu nome")
return
}

document.querySelector(".btn").style.display="none"
document.querySelector(".input").style.display="none"

let loading = document.getElementById("loading")
loading.style.display="block"

let percent = document.getElementById("percent")
let fill = document.getElementById("fill")
let status = document.getElementById("status")

let steps = [
"Iniciando verificação...",
"Validando conexão...",
"Checando segurança...",
"Processando dados...",
"Finalizando..."
]

let progress = 0

let interval = setInterval(()=>{

progress += Math.floor(Math.random()*8)+3

if(progress > 100) progress = 100

fill.style.width = progress + "%"
percent.innerText = progress + "%"

let stepIndex = Math.floor(progress / 20)
status.innerText = steps[stepIndex] || "Finalizando..."

if(progress >= 100){
clearInterval(interval)

setTimeout(()=>{
loading.style.display="none"
document.getElementById("result").style.display="block"
},800)

}

},300)

}

</script>

</body>
</html>
